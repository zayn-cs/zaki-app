      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLot
      tags: [lots]
      summary: Update a lot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLotBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lot"
    delete:
      operationId: deleteLot
      tags: [lots]
      summary: Delete a lot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /phases:
    get:
      operationId: getPhases
      tags: [phases]
      summary: List all phases
      parameters:
        - name: id_lot
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of phases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Phase"
    post:
      operationId: createPhase
      tags: [phases]
      summary: Create a phase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhaseBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phase"

  /phases/{id}:
    get:
      operationId: getPhase
      tags: [phases]
      summary: Get a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phase
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePhase
      tags: [phases]
      summary: Update a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhaseBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phase"
    delete:
      operationId: deletePhase
      tags: [phases]
      summary: Delete a phase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents:
    get:
      operationId: getDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: id_projet
          in: query
          schema:
            type: integer
        - name: id_lot
          in: query
          schema:
            type: integer
        - name: id_phase
          in: query
          schema:
            type: integer
        - name: statut
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document (metadata only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/{id}/upload:
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a file for a document (creates new version)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                commentaire:
                  type: string
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"

  /documents/{id}/archiver:
    post:
      operationId: archiverDocument
      tags: [documents]
      summary: Archive a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                commentaire:
                  type: string
      responses:
        "200":
          description: Document archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/versions:
    get:
      operationId: getDocumentVersions
      tags: [documents]
      summary: Get all versions of a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Version"

  /utilisateurs:
    get:
      operationId: getUtilisateurs
      tags: [utilisateurs]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: id_departement
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Utilisateur"
    post:
      operationId: createUtilisateur
      tags: [utilisateurs]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUtilisateurBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Utilisateur"

  /utilisateurs/{id}:
    get:
      operationId: getUtilisateur
      tags: [utilisateurs]
      summary: Get a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Utilisateur"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUtilisateur
      tags: [utilisateurs]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUtilisateurBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Utilisateur"
    delete:
      operationId: deleteUtilisateur
      tags: [utilisateurs]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bet:
    get:
      operationId: getBets
      tags: [bet]
      summary: List all BETs
      responses:
        "200":
          description: List of BETs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"
    post:
      operationId: createBet
      tags: [bet]
      summary: Create a BET
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBetBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"

  /bet/{id}:
    get:
      operationId: getBet
      tags: [bet]
      summary: Get a BET
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: BET
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBet
      tags: [bet]
      summary: Update a BET
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBetBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bet"
    delete:
      operationId: deleteBet
      tags: [bet]
      summary: Delete a BET
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /unites:
    get:
      operationId: getUnites
      tags: [unites]
      summary: List all units
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Unite"
    post:
      operationId: createUnite
      tags: [unites]
      summary: Create a unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUniteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unite"

  /unites/{id}:
    patch:
      operationId: updateUnite
      tags: [unites]
      summary: Update a unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUniteBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Unite"
    delete:
      operationId: deleteUnite
      tags: [unites]
      summary: Delete a unit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /historique:
    get:
      operationId: getHistorique
      tags: [historique]
      summary: Get action history
      parameters:
        - name: id_utilisateur
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - name: entite_type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Action history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Historique"

  /recherche/projets:
    get:
      operationId: rechercherProjets
      tags: [recherche]
      summary: Advanced search for projects
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: stade
          in: query
          schema:
            type: string
        - name: priorite
          in: query
          schema:
            type: string
        - name: montant_min
          in: query
          schema:
            type: number
        - name: montant_max
          in: query
          schema:
            type: number
        - name: annee_debut
          in: query
          schema:
            type: integer
        - name: annee_fin
          in: query
          schema:
            type: integer
        - name: type_projet
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Projet"

  /recherche/documents:
    get:
      operationId: rechercherDocuments
      tags: [recherche]
      summary: Advanced search for documents
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: id_projet
          in: query
          schema:
            type: integer
        - name: id_lot
          in: query
          schema:
            type: integer
        - name: id_phase
          in: query
          schema:
            type: integer
        - name: id_type
          in: query
          schema:
            type: integer
        - name: statut
          in: query
          schema:
            type: string
        - name: date_debut
          in: query
          schema:
            type: string
        - name: date_fin
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
