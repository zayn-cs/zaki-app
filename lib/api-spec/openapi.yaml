              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TypeDocument"
    post:
      operationId: createType
      tags: [types]
      summary: Create a document type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTypeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TypeDocument"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        messager:
          type: string
        mot_pass:
          type: string
      required:
        - messager
        - mot_pass

    AuthUser:
      type: object
      properties:
        id:
